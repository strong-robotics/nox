<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Living Agents</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F4F5FA;
  --ink: #2B2F4A;
  --ink-soft: #8A8FAE;
  --orbit: #C9CAE6;
}
* { box-sizing: border-box; }
html, body, #root {
  margin: 0; padding: 0; height: 100%;
  background: var(--bg); color: var(--ink);
  font-family: "Inter", "Helvetica Neue", Helvetica, Arial, sans-serif;
  -webkit-font-smoothing: antialiased; overflow: hidden;
}
.scene {
  position: relative; width: 100vw; height: 100vh;
  display: grid; place-items: center;
  background: radial-gradient(ellipse at 50% 45%, #ffffff 0%, #F4F5FA 60%, #ECEDF6 100%);
}
.stage {
  position: relative;
  width: min(960px, 96vmin);
  height: min(960px, 96vmin);
}
/* Light portal disk — fits INSIDE the colored agent ring. White/very light
   interior with a perspective grid floor in the lower half. */
.disk {
  position: absolute;
  left: 50%; top: 50%;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  background:
    radial-gradient(circle at 50% 80%, #FFFFFF 0%, #F6F4FF 35%, #ECEAFB 70%, #E4E0F4 100%);
  box-shadow:
    inset 0 0 0 1px rgba(140, 130, 210, 0.18),
    0 8px 30px -10px rgba(80, 60, 180, 0.15);
  overflow: hidden;
  z-index: 0;
}
.disk-grid {
  position: absolute; inset: 0;
  pointer-events: none;
}
.ring-wrap, .arrow-wrap, .tile-wrap, .center { z-index: 2; }
.ring-wrap { position: absolute; inset: 0; }
.orbit-dashed {
  position: absolute; left: 50%; top: 50%;
  border-radius: 50%;
  border: 1.5px dashed var(--orbit);
  opacity: 0.85;
  will-change: transform;
}
.orbit-dots { position: absolute; left: 50%; top: 50%; width: 0; height: 0; will-change: transform; }
.orbit-dot {
  position: absolute; left: 0; top: 0;
  width: 7px; height: 7px; margin: -3.5px 0 0 -3.5px;
  border-radius: 50%; background: var(--orbit);
}
.ring-grad {
  position: absolute; left: 50%; top: 50%;
  border-radius: 50%;
  transform: translate(-50%, -50%);
  filter: drop-shadow(0 0 6px rgba(123,123,255,0.10));
  will-change: filter, background;
}
.ring-node {
  position: absolute;
  width: 10px; height: 10px;
  margin: -5px 0 0 -5px;
  border-radius: 50%;
  background: #fff;
  border: 2px solid;
  box-shadow: 0 1px 4px rgba(43,47,74,0.15);
  pointer-events: none;
}
.tile-wrap {
  position: absolute; left: 50%; top: 50%;
  width: 0; height: 0;
  pointer-events: none;
  will-change: transform;
}
.tile-card {
  position: absolute;
  left: 50%; top: 50%;
  transform: translate(-50%, -50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  will-change: transform;
}
.tile-halo {
  position: absolute;
  left: 50%; top: 26px;
  transform: translate(-50%, -50%);
  width: 130px; height: 130px;
  border-radius: 50%;
  filter: blur(8px);
  opacity: calc(0.55 * var(--halo, 1));
  z-index: 0;
  will-change: opacity;
}
.tile {
  position: relative;
  z-index: 1;
  background: #fff;
  border-radius: 18px;
  padding: 10px;
  box-shadow:
    0 18px 38px -18px rgba(43,47,74,0.28),
    0 4px 10px -4px rgba(43,47,74,0.10),
    inset 0 0 0 1px rgba(255,255,255,0.9);
}
.tile-icon {
  width: 60px; height: 60px;
  border-radius: 15px;
  display: grid; place-items: center;
  color: #fff;
}
.tile-label {
  color: #1A1F4D;
}
.tile-label {
  position: relative;
  z-index: 1;
  font-size: 11.5px;
  letter-spacing: 0.18em;
  font-weight: 600;
  color: var(--ink);
  white-space: nowrap;
  text-align: center;
}
.center {
  position: absolute; left: 50%; top: 50%;
  transform: translate(-50%, -50%);
  text-align: center; width: 240px;
}
.brain { display: grid; place-items: center; margin-bottom: 16px; will-change: transform; }
.title {
  font-size: 13px; letter-spacing: 0.16em;
  font-weight: 700; color: var(--ink);
  margin-bottom: 8px;
  will-change: opacity;
}
.subtitle {
  font-size: 12.5px; line-height: 1.45;
  color: var(--ink-soft);
}
.arrow-wrap {
  position: absolute; left: 50%; top: 50%;
  width: 0; height: 0; pointer-events: none;
}
.arrow-line {
  position: absolute; top: -1px; height: 2px;
  border-radius: 2px;
  will-change: opacity;
}
.arrow-head {
  position: absolute; top: -5px;
  width: 0; height: 0;
  border-top: 5px solid transparent;
  border-bottom: 5px solid transparent;
  border-left: 7px solid;
  will-change: opacity;
}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<script type="text/babel" data-presets="react">

// tweaks-panel.jsx
// Reusable Tweaks shell + form-control helpers.
//
// Owns the host protocol (listens for __activate_edit_mode / __deactivate_edit_mode,
// posts __edit_mode_available / __edit_mode_set_keys / __edit_mode_dismissed) so

// don't hand-draw <input type="range">, segmented radios, steppers, etc.
//
// Usage (in an HTML file that loads React + Babel):
//
//   const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{

//     "fontSize": 16,
//     "density": "regular",

//         Hello
//         <TweaksPanel>
//           <TweakSection label="Typography" />
//           <TweakSlider label="Font size" value={t.fontSize} min={10} max={32} unit="px"
//                        onChange={(v) => setTweak('fontSize', v)} />
//           <TweakRadio  label="Density" value={t.density}
//                        options={['compact', 'regular', 'comfy']}
//                        onChange={(v) => setTweak('density', v)} />
//           <TweakSection label="Theme" />
//           <TweakColor  label="Primary" value={t.primaryColor}
//                        onChange={(v) => setTweak('primaryColor', v)} />
//           <TweakToggle label="Dark mode" value={t.dark}
//                        onChange={(v) => setTweak('dark', v)} />
//         </TweaksPanel>
//       </div>
//     );
//   }
//
// ─────────────────────────────────────────────────────────────────────────────

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

</script>
<script type="text/babel" data-presets="react">
// Living agent constellation — slow, weightless motion.
// Animation runs via rAF directly mutating DOM transforms (NO React state per frame),
// which eliminates jitter completely.

const { useEffect, useRef, useState, useMemo } = React;

// Agent palette mirrors the reference: tile uses a vertical gradient (top→bottom),
// `color` is the dominant mid-tone used for halo / arrow / ring node accents.
const AGENTS = [
  { id: "architect", label: "ARCHITECT", angle: -90, color: "#3D7BFF", gradFrom: "#5A93FF", gradTo: "#2B5FE0", icon: "architect" },
  { id: "developer", label: "DEVELOPER", angle: 0,   color: "#7C5CFF", gradFrom: "#9277FF", gradTo: "#5E3FE5", icon: "developer" },
  { id: "tester",    label: "TESTER",    angle: 90,  color: "#27D69E", gradFrom: "#3BE3AC", gradTo: "#15B884", icon: "tester"   },
  { id: "designer",  label: "DESIGNER",  angle: 180, color: "#FFA53D", gradFrom: "#FFC066", gradTo: "#F08A2E", icon: "designer" },
];

// Geometry, all as fractions of stage size (min(width, height) of .stage):
const RING_DIAMETER  = 0.56;  // inner gradient ring outer diameter
const RING_THICKNESS = 0.010; // ring stroke
const DASH_DIAMETER  = 0.74;  // outer dashed orbit (where tile centers sit)
const TILE_RADIUS    = 0.37;  // = DASH_DIAMETER / 2 → tiles ride the dashed orbit
const NODE_RADIUS    = 0.285; // nodes ON the inner ring
const ARROW_INNER    = 0.20;  // arrow inner end (just inside the inner ring stroke)
const ARROW_LEN      = 0.075; // arrow length
const TILE_HALF_HEIGHT = 0.07; // half-height of card in stage fractions, used for layout safety

function Icon({ kind }) {
  const s = { width: 28, height: 28, stroke: "#fff", strokeWidth: 2, fill: "none", strokeLinecap: "round", strokeLinejoin: "round" };
  // Architect: org-tree / hierarchy diagram — one node up top, three below.
  if (kind === "architect") return (
    <svg viewBox="0 0 24 24" {...s}>
      <rect x="9" y="3.5" width="6" height="5" rx="1.2"/>
      <rect x="3" y="15.5" width="5" height="5" rx="1.2"/>
      <rect x="9.5" y="15.5" width="5" height="5" rx="1.2"/>
      <rect x="16" y="15.5" width="5" height="5" rx="1.2"/>
      <path d="M12 8.5v3M5.5 15.5v-1.5h13V15.5M12 14v1.5"/>
    </svg>
  );
  // Developer: </>
  if (kind === "developer") return (
    <svg viewBox="0 0 24 24" {...s}>
      <path d="M9 8l-4 4 4 4M15 8l4 4-4 4M13.5 6.5l-3 11"/>
    </svg>
  );
  // Tester: shield with check
  if (kind === "tester") return (
    <svg viewBox="0 0 24 24" {...s}>
      <path d="M12 3.2l7 2.4v6c0 4.2-2.8 7.7-7 9.2-4.2-1.5-7-5-7-9.2v-6l7-2.4z"/>
      <path d="M8.5 12.2l2.7 2.6 4.5-4.6"/>
    </svg>
  );
  // Designer: pen / nib
  if (kind === "designer") return (
    <svg viewBox="0 0 24 24" {...s}>
      <path d="M14.5 4.2l5.3 5.3-9.3 9.3-5.6 1.4 1.4-5.6 8.2-10.4z"/>
      <path d="M13 6l5 5"/>
      <path d="M8.5 17.5l-2-2"/>
    </svg>
  );
  return null;
}

function BrainIcon() {
  return (
    <svg viewBox="0 0 48 48" width="44" height="44" fill="none" stroke="#5340B8" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round">
      <path d="M22 10c-3 0-5 2-5 4.5 0 .4.05.8.13 1.16C15.3 16.4 14 18 14 20c0 1 .3 1.9.8 2.6-.5.7-.8 1.6-.8 2.6 0 1.6.85 3 2.1 3.7-.07.4-.1.8-.1 1.2 0 2.5 2 4.5 4.5 4.5 1 0 1.9-.32 2.6-.86V10.86A4.46 4.46 0 0 0 22 10Z"/>
      <path d="M26 10c3 0 5 2 5 4.5 0 .4-.05.8-.13 1.16C32.7 16.4 34 18 34 20c0 1-.3 1.9-.8 2.6.5.7.8 1.6.8 2.6 0 1.6-.85 3-2.1 3.7.07.4.1.8.1 1.2 0 2.5-2 4.5-4.5 4.5-1 0-1.9-.32-2.6-.86V10.86A4.46 4.46 0 0 1 26 10Z"/>
      <path d="M19 18.5h2M27 18.5h2M19 25h3M26 25h3M21 31h6"/>
    </svg>
  );
}

// Hook: install a rAF loop that calls `onFrame(t)` every frame.
// `onFrame` reads from a ref (not state) so component never re-renders for animation.
function useRaf(running, onFrame) {
  useEffect(() => {
    if (!running) return;
    let raf;
    const start = performance.now();
    const tick = () => {
      onFrame((performance.now() - start) / 1000);
      raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [running, onFrame]);
}

function useStageSize() {
  const ref = useRef(null);
  const [size, setSize] = useState(700);
  useEffect(() => {
    if (!ref.current) return;
    const el = ref.current;
    let last = 0;
    const update = () => {
      const r = el.getBoundingClientRect();
      const next = Math.round(Math.min(r.width, r.height));
      if (Math.abs(next - last) >= 1) {
        last = next;
        setSize(next);
      }
    };
    update();
    const ro = new ResizeObserver(update);
    ro.observe(el);
    window.addEventListener("resize", update);
    return () => { ro.disconnect(); window.removeEventListener("resize", update); };
  }, []);
  return [ref, size];
}

function PerspectiveGrid() {
  // Radial fan of "pill" segments emanating from a vanishing point above the
  // disk center. The fan opens ~200° so the side rays curl up above the
  // horizon (giving the bowl/lens look). Each ray is a chain of rounded
  // capsules whose length, thickness and opacity grow from VP outward; the
  // hue is driven by ray angle (orange → cyan → violet).
  const W = 1200, H = 1000;
  const cx = W / 2;
  const cy = H * 0.46;            // vanishing point — slightly above center
  const RAY_COUNT = 31;
  const SPAN = 200;                // degrees, opens upward through 360°
  const A_FROM = 90 - SPAN / 2;    // 90° points straight down
  const A_TO   = 90 + SPAN / 2;
  const RAY_LEN = H * 0.78;
  // Hue across the fan: orange→pink→cyan→blue→violet.
  const colorAt = (t) => {
    const stops = [
      [0.00, [243, 145,  62]],   // orange
      [0.18, [240, 110, 140]],   // pink
      [0.42, [ 60, 210, 220]],   // cyan
      [0.62, [ 70, 130, 255]],   // blue
      [1.00, [150,  90, 230]],   // violet
    ];
    for (let i = 1; i < stops.length; i++) {
      const [pa, ca] = stops[i - 1];
      const [pb, cb] = stops[i];
      if (t <= pb) {
        const u = (t - pa) / (pb - pa);
        return [
          Math.round(ca[0] + (cb[0] - ca[0]) * u),
          Math.round(ca[1] + (cb[1] - ca[1]) * u),
          Math.round(ca[2] + (cb[2] - ca[2]) * u),
        ];
      }
    }
    return stops[stops.length - 1][1];
  };
  // Generate one ray of pill-shaped capsules, oriented along the ray.
  // Lens-bulge: capsule positions are nudged outward perpendicular to the
  // ray as they get farther from the vanishing point — small near VP, big
  // near the camera. This curves each ray into the classic "lens" arc.
  const buildRay = (deg, color, key, idx, total) => {
    const [r, g, b] = color;
    const rad = (deg * Math.PI) / 180;
    const dx = Math.cos(rad), dy = Math.sin(rad);
    // perpendicular direction (rotated +90°) — used for outward bulge.
    // Sign depends on which side of the fan center this ray sits on.
    const fanT = idx / (total - 1);            // 0 left → 1 right
    const sideSign = (fanT - 0.5) * 2;          // -1..+1
    // Perpendicular vector pointing away from fan axis (downward).
    // For the central ray sideSign≈0 → no bulge.
    const px = -dy, py = dx;                    // 90° rotation
    const pills = [];
    let pos = 0.03;
    let i = 0;
    while (pos < 1) {
      const pillLen = 0.012 + Math.pow(pos, 1.4) * 0.085;
      const gapLen  = 0.018 + Math.pow(pos, 1.2) * 0.040;
      const a = pos;
      const b = Math.min(1, pos + pillLen);
      // Bulge offset: 0 at VP, peaks near the camera, scales with sideSign
      // and with how far the ray angle is from straight-down.
      const angleDeviation = Math.abs(deg - 90) / 100;  // 0..1-ish
      const bulgeMag = 90 * Math.pow(pos, 1.6) * sideSign * angleDeviation;
      const ax = cx + dx * RAY_LEN * a + px * bulgeMag;
      const ay = cy + dy * RAY_LEN * a + py * bulgeMag;
      const bulgeMagB = 90 * Math.pow(b, 1.6) * sideSign * angleDeviation;
      const bx = cx + dx * RAY_LEN * b + px * bulgeMagB;
      const by = cy + dy * RAY_LEN * b + py * bulgeMagB;
      const w  = 1.6 + Math.pow(pos, 1.3) * 9.5;
      const op = 0.18 + Math.pow(pos, 0.9) * 0.85;
      pills.push(
        <line
          key={key + "p" + (i++)}
          x1={ax} y1={ay} x2={bx} y2={by}
          stroke={`rgba(${r},${g},${b},${op})`}
          strokeWidth={w}
          strokeLinecap="round"
        />
      );
      pos = b + gapLen;
    }
    return pills;
  };
  const allPills = [];
  for (let i = 0; i < RAY_COUNT; i++) {
    const t = i / (RAY_COUNT - 1);
    const deg = A_FROM + (A_TO - A_FROM) * t;
    allPills.push(...buildRay(deg, colorAt(t), "r" + i, i, RAY_COUNT));
  }
  // Horizon arcs — faint, suggest a curved floor.
  const horizons = [];
  const HORIZ = 4;
  for (let i = 1; i <= HORIZ; i++) {
    const t = i / HORIZ;
    const k = Math.pow(t, 1.4);
    const rx = k * (W * 0.46);
    const ry = k * (H * 0.16);
    const d = `M ${cx - rx} ${cy} A ${rx} ${ry} 0 0 0 ${cx + rx} ${cy}`;
    horizons.push(
      <path key={"h" + i} d={d}
            stroke="rgba(140, 130, 200, 0.22)"
            strokeWidth="1"
            strokeDasharray="3 8"
            fill="none" />
    );
  }
  return (
    <div className="disk-grid">
      <svg
        width="100%" height="100%"
        viewBox={`0 0 ${W} ${H}`}
        preserveAspectRatio="xMidYMid slice"
        style={{ position: "absolute", inset: 0, overflow: "visible" }}
      >
        <defs>
          <filter id="pillGlow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3.5" />
          </filter>
          <radialGradient id="fanFade" cx="50%" cy="46%" r="58%">
            <stop offset="0%"  stopColor="#fff" stopOpacity="0.55" />
            <stop offset="55%" stopColor="#fff" stopOpacity="1" />
            <stop offset="92%" stopColor="#fff" stopOpacity="1" />
            <stop offset="100%" stopColor="#fff" stopOpacity="0" />
          </radialGradient>
          <mask id="fanMask">
            <rect width={W} height={H} fill="url(#fanFade)" />
          </mask>
        </defs>
        <g mask="url(#fanMask)">
          {horizons}
          {/* Glow underlay */}
          <g filter="url(#pillGlow)" opacity="0.7">{allPills}</g>
          {/* Crisp top */}
          <g>{allPills}</g>
        </g>
      </svg>
    </div>
  );
}

function Tile({ agent, registerEl }) {
  return (
    <div className="tile-wrap" ref={(el) => registerEl(agent.id, "wrap", el)}>
      <div className="tile-card" ref={(el) => registerEl(agent.id, "card", el)}>
        <div
          className="tile-halo"
          ref={(el) => registerEl(agent.id, "halo", el)}
          style={{
            background: `radial-gradient(closest-side, ${agent.color}55, ${agent.color}00 70%)`,
          }}
        />
        <div className="tile">
          <div className="tile-icon" style={{
            background: `linear-gradient(180deg, ${agent.gradFrom}, ${agent.gradTo})`,
            boxShadow: `0 10px 24px -8px ${agent.color}99, inset 0 1px 0 rgba(255,255,255,0.25)`
          }}>
            <Icon kind={agent.icon} />
          </div>
        </div>
        <div className="tile-label">{agent.label}</div>
      </div>
    </div>
  );
}

function Scene() {
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "running": true,
    "orbitPeriod": 90,
    "ringSpeed": 60,
    "dashSpeed": 240,
    "tileBreathe": true,
    "ringPulse": true,
    "showArrows": true,
    "showHalo": true,
    "showNodes": true
  }/*EDITMODE-END*/;

  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [stageRef, stage] = useStageSize();

  // Refs for everything we animate — avoids React re-renders.
  const elsRef = useRef({});
  const ringGradRef = useRef(null);
  const orbitDashedRef = useRef(null);
  const orbitDotsRef = useRef(null);
  const brainRef = useRef(null);
  const titleRef = useRef(null);
  const arrowRefs = useRef({});

  const registerTileEl = (id, kind, el) => {
    if (!elsRef.current[id]) elsRef.current[id] = {};
    elsRef.current[id][kind] = el;
  };
  const registerArrow = (id, kind, el) => {
    if (!arrowRefs.current[id]) arrowRefs.current[id] = {};
    arrowRefs.current[id][kind] = el;
  };

  // Stable params snapshot the rAF reads — updated when tweaks change.
  const paramsRef = useRef({});
  paramsRef.current = { tweaks, stage };

  const onFrame = useMemo(() => (t) => {
    const { tweaks, stage } = paramsRef.current;
    if (!stage) return;

    const baseR = stage * TILE_RADIUS;
    const { orbitPeriod, ringSpeed, dashSpeed, tileBreathe, ringPulse } = tweaks;

    // Tiles
    for (const a of AGENTS) {
      const refs = elsRef.current[a.id];
      if (!refs || !refs.wrap) continue;
      const phase = (a.angle * Math.PI) / 180;
      const orbitDeg = ((a.angle + (t * 360) / orbitPeriod) % 360 + 360) % 360;
      const ang = (orbitDeg * Math.PI) / 180;
      const r = baseR + Math.sin((t * 2 * Math.PI) / 9 + phase) * (stage * 0.004);
      const x = Math.cos(ang) * r;
      const y = Math.sin(ang) * r;
      refs.wrap.style.transform = `translate3d(calc(-50% + ${x.toFixed(2)}px), calc(-50% + ${y.toFixed(2)}px), 0)`;

      if (refs.card) {
        const scale = tileBreathe ? 1 + Math.sin((t * 2 * Math.PI) / 5 + phase) * 0.018 : 1;
        refs.card.style.transform = `translate3d(-50%, -50%, 0) scale(${scale.toFixed(4)})`;
      }
      if (refs.halo) {
        const op = 0.55 + Math.sin((t * 2 * Math.PI) / 4 + phase) * 0.12;
        refs.halo.style.opacity = String(Math.max(0, op));
      }
    }

    // Segmented ring rotates in sync with the tiles (same orbitPeriod / direction).
    if (ringGradRef.current) {
      const ringAngle = ((t * 360) / orbitPeriod) % 360;
      ringGradRef.current.style.transform =
        `translate(-50%, -50%) rotate(${ringAngle.toFixed(2)}deg)`;
    }

    // Outer dashed orbit + dots: counter-rotate (modulo 360 to keep numbers bounded)
    const dashAngle = (-(t * 360) / dashSpeed) % 360;
    if (orbitDashedRef.current) {
      orbitDashedRef.current.style.transform = `translate3d(-50%, -50%, 0) rotate(${dashAngle.toFixed(2)}deg)`;
    }
    if (orbitDotsRef.current) {
      orbitDotsRef.current.style.transform = `translate3d(-50%, -50%, 0) rotate(${dashAngle.toFixed(2)}deg)`;
    }

    // Brain breathing + title pulse
    if (brainRef.current) {
      const s = 1 + Math.sin((t * 2 * Math.PI) / 7) * 0.025;
      brainRef.current.style.transform = `scale(${s.toFixed(4)})`;
    }
    if (titleRef.current) {
      const op = 0.85 + Math.sin((t * 2 * Math.PI) / 5) * 0.08;
      titleRef.current.style.opacity = String(op);
    }

    // Arrows pulse
    for (const a of AGENTS) {
      const refs = arrowRefs.current[a.id];
      if (!refs) continue;
      const phase = (a.angle * Math.PI) / 180;
      const op = 0.5 + Math.sin((t * 2 * Math.PI) / 3 + phase) * 0.25;
      if (refs.line) refs.line.style.opacity = String(op);
      if (refs.head) refs.head.style.opacity = String(op);
    }
  }, []);

  useRaf(tweaks.running, onFrame);

  // Static-ish layout values that depend on stage size (recomputed on resize):
  const ringD = stage * RING_DIAMETER;
  const dashD = stage * DASH_DIAMETER;
  // Dashed orbit circle is rendered via 1.5px border. The stroke is drawn
  // ON the box edge (centered on it), so the visual center-line of the
  // dashes sits at radius = dashD/2 - borderWidth/2. Place the dots on
  // exactly that radius so they always land on the dashes.
  const DASH_BORDER = 1.5;
  const dotR  = (dashD - DASH_BORDER) / 2;
  const stroke = stage * RING_THICKNESS;
  const innerR = ringD / 2 - stroke;
  const outerR = ringD / 2;
  const arrowInner = stage * ARROW_INNER;
  const arrowLen = stage * ARROW_LEN;
  const nodeR = stage * NODE_RADIUS;

  return (
    <div className="scene">
      <div ref={stageRef} className="stage" style={{ "--halo": tweaks.showHalo ? 1 : 0 }}>
        <div className="disk" style={{ width: ringD * 0.84, height: ringD * 0.84 }}>
          <PerspectiveGrid />
        </div>
        <div className="ring-wrap">
          <div
            ref={orbitDashedRef}
            className="orbit-dashed"
            style={{ width: dashD, height: dashD }}
          />
          <div ref={orbitDotsRef} className="orbit-dots">
            {[30, 60, 120, 150, 210, 240, 300, 330].map((deg) => (
              <span
                key={deg}
                className="orbit-dot"
                style={{ transform: `rotate(${deg}deg) translate(0, ${-dotR}px)` }}
              />
            ))}
          </div>
          {(() => {
            // Segmented ring: 4 colored arcs centered on each agent's angle,
            // with white-stroked nodes at agent positions. The whole <g> rotates
            // synchronously with the orbiting tiles via ringSegRef.
            const R = (innerR + outerR) / 2;          // center-line radius of stroke
            const SW = stroke;                         // arc stroke width
            const VB = ringD + SW * 4;                 // viewBox padded for glow
            const C = VB / 2;
            const GAP_DEG = 18;                        // gap between arcs around each node
            const ARC_DEG = 90 - GAP_DEG;              // each arc spans (90 − gap)
            const polar = (deg) => {
              const r = (deg * Math.PI) / 180;
              return [C + R * Math.cos(r), C + R * Math.sin(r)];
            };
            const arcPath = (a0, a1) => {
              const [x0, y0] = polar(a0);
              const [x1, y1] = polar(a1);
              const large = (a1 - a0) > 180 ? 1 : 0;
              return `M ${x0.toFixed(2)} ${y0.toFixed(2)} A ${R} ${R} 0 ${large} 1 ${x1.toFixed(2)} ${y1.toFixed(2)}`;
            };
            return (
              <svg
                ref={ringGradRef}
                width={VB} height={VB}
                viewBox={`0 0 ${VB} ${VB}`}
                style={{
                  position: "absolute", left: "50%", top: "50%",
                  transform: "translate(-50%, -50%)",
                  overflow: "visible",
                  willChange: "transform",
                }}
              >
                <g>
                  {AGENTS.map((a) => {
                    // Arc centered on agent angle, spanning ARC_DEG total.
                    const a0 = a.angle - ARC_DEG / 2;
                    const a1 = a.angle + ARC_DEG / 2;
                    return (
                      <g key={a.id + "-arc"}>
                        {/* Soft glow underneath */}
                        <path
                          d={arcPath(a0, a1)}
                          stroke={a.color}
                          strokeWidth={SW * 2.2}
                          strokeLinecap="round"
                          fill="none"
                          opacity="0.28"
                          style={{ filter: `blur(${(SW * 0.9).toFixed(1)}px)` }}
                        />
                        {/* Solid colored arc */}
                        <path
                          d={arcPath(a0, a1)}
                          stroke={a.color}
                          strokeWidth={SW}
                          strokeLinecap="round"
                          fill="none"
                        />
                      </g>
                    );
                  })}
                  {AGENTS.map((a) => {
                    const [cx, cy] = polar(a.angle);
                    return (
                      <circle
                        key={a.id + "-knot"}
                        cx={cx} cy={cy}
                        r={SW * 0.95}
                        fill="#fff"
                        stroke={a.color}
                        strokeWidth={SW * 0.55}
                      />
                    );
                  })}
                </g>
              </svg>
            );
          })()}
        </div>

        {tweaks.showNodes && AGENTS.map((a) => {
          const ang = (a.angle * Math.PI) / 180;
          return (
            <div
              key={a.id + "-node"}
              className="ring-node"
              style={{
                left: `calc(50% + ${Math.cos(ang) * nodeR}px)`,
                top: `calc(50% + ${Math.sin(ang) * nodeR}px)`,
                borderColor: a.color,
              }}
            />
          );
        })}

        {tweaks.showArrows && AGENTS.map((a) => (
          <div
            key={a.id + "-arrow"}
            className="arrow-wrap"
            style={{ transform: `translate(-50%, -50%) rotate(${a.angle}deg)` }}
          >
            <div
              ref={(el) => registerArrow(a.id, "line", el)}
              className="arrow-line"
              style={{
                left: arrowInner,
                width: arrowLen,
                background: `linear-gradient(90deg, ${a.color}00, ${a.color}cc)`,
              }}
            />
            <div
              ref={(el) => registerArrow(a.id, "head", el)}
              className="arrow-head"
              style={{
                left: arrowInner - 7,
                borderLeftColor: a.color,
              }}
            />
          </div>
        ))}

        {AGENTS.map((a) => (
          <Tile key={a.id} agent={a} registerEl={registerTileEl} />
        ))}

        <div className="center">
          <div ref={brainRef} className="brain"><BrainIcon /></div>
          <div ref={titleRef} className="title">СИСТЕМА ГОТОВА К РАБОТЕ</div>
          <div className="subtitle">Все агенты запущены<br/>и ожидают задачи</div>
        </div>
      </div>

      <TweaksPanel title="Tweaks">
        <TweakSection label="Motion" />
        <TweakToggle label="Running" value={tweaks.running} onChange={(v) => setTweak("running", v)} />
        <TweakSlider label="Tile orbit period" value={tweaks.orbitPeriod} min={20} max={300} step={5} unit="s" onChange={(v) => setTweak("orbitPeriod", v)} />
        <TweakSlider label="Dashed orbit period" value={tweaks.dashSpeed} min={60} max={600} step={10} unit="s" onChange={(v) => setTweak("dashSpeed", v)} />
        <TweakSection label="Effects" />
        <TweakToggle label="Tile breathing" value={tweaks.tileBreathe} onChange={(v) => setTweak("tileBreathe", v)} />
        <TweakToggle label="Inward arrows" value={tweaks.showArrows} onChange={(v) => setTweak("showArrows", v)} />
        <TweakToggle label="Ring nodes" value={tweaks.showNodes} onChange={(v) => setTweak("showNodes", v)} />
        <TweakToggle label="Tile halo" value={tweaks.showHalo} onChange={(v) => setTweak("showHalo", v)} />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Scene />);

</script>
</body>
</html>
